<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Teman Lari">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="Icon.svg"/>

  <title>Teman Lari</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      if (params.has('code') || params.has('state') || params.has('flutter-web-auth-2')) {
        var url = window.location.href;
        var message = {'flutter-web-auth-2': url};
        if (window.opener) {
          window.opener.postMessage(message, window.location.origin);
          window.close();
        } else if (window.parent && window.parent !== window) {
          window.parent.postMessage(message, window.location.origin);
        } else {
          localStorage.setItem('flutter-web-auth-2', url);
          window.close();
        }
        document.addEventListener('DOMContentLoaded', function() {
          document.body.innerHTML = '<p>Authentication complete. You can close this window.</p>';
        });
        return;
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
