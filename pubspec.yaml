name: strava_run_analyzer
description: "A Strava running analyzer app with training plan generation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking & Auth
  http: ^1.2.0
  flutter_web_auth_2: ^3.1.0
  flutter_secure_storage: ^9.0.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Data & Serialization
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # Local Storage
  sqflite: ^2.3.0
  path: ^1.9.0
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.67.0

  # Navigation
  go_router: ^13.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  mockito: ^5.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
