name: teman_lari
description: "A Strava running analyzer app with training plan generation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

  # Networking & Auth
  http: ^1.6.0
  flutter_web_auth_2: ^5.0.2
  flutter_secure_storage: ^10.2.0

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Data & Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Local Storage
  sqflite: ^2.4.2
  path: ^1.9.1
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^1.2.0

  # Navigation
  go_router: ^17.2.3

  # Utils
  intl: ^0.20.2
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  mockito: ^5.6.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "Icon.png"
  adaptive_icon_background: "#FC4C02"
  adaptive_icon_foreground: "Icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
